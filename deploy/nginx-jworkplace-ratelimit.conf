# Деплой в /etc/nginx/conf.d/jworkplace-ratelimit.conf
# Живёт в http{} контексте (conf.d/* инклудится в http), НЕ внутри server/location.
# Зоны используются директивами `limit_req zone=...` в /etc/nginx/sites-available/jwork.jorchik.com.
#
# Отдельные зоны jworkplace — не пересекаются с зонами соседей (chat/chat_local).
# ВНИМАНИЕ: limit_req_status здесь НЕ задаём — это одиночная http-директива, её уже
# выставляет webchat-ratelimit.conf (429) на весь http-контекст; дубликат ломает `nginx -t`.

# Общий лимит на /api/* (чтение списка/статусов): 60r/m (~1 req/s), burst гасит поллинг фронта.
limit_req_zone $binary_remote_addr zone=jwork_api:10m rate=60r/m;

# Строгий лимит только на запись (POST = создание проекта → клон+индексация, дорого).
# map даёт ключ лишь для POST; для GET ключ пустой → nginx пропускает (лимит не применяется),
# поэтому GET-поллинг списка проектов не режется.
map $request_method $jwork_write_key {
    default "";
    POST    $binary_remote_addr;
}
limit_req_zone $jwork_write_key zone=jwork_index:10m rate=5r/m;
