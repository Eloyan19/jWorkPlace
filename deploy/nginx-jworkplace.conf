# Полный отдельный server{} блок для поддомена jwork.jorchik.com.
# Вставляется как отдельный файл в /etc/nginx/sites-available/jwork.jorchik.com
# (и симлинк в sites-enabled), а НЕ мёржится в существующие server-блоки
# jorchik.com / llm.jorchik.com — свой виртуальный хост со своим фронтом и backend'ом.
#
# DNS: jwork.jorchik.com уже резолвится на этот VPS (wildcard *.jorchik.com,
# 202.71.13.114) — отдельная A-запись не нужна.
#
# Frontend static build выложен в /var/www/jworkplace (см. deploy/README.md).
# Backend — jworkplace.service на 127.0.0.1:8200.
#
# ТОКЕН-ГЕЙТ (Этап 1): __GATE_TOKEN__ — плейсхолдер. Реальный токен НЕ коммитим: он
# инжектится в живой /etc/nginx/sites-available/jwork.jorchik.com на деплое из backend/.env
# (GATE_TOKEN), см. deploy/README.md → «Токен-гейт». Rate-limit зоны: deploy/nginx-jworkplace-ratelimit.conf.

server {
    server_name jwork.jorchik.com;

    root /var/www/jworkplace;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api/health — открыт (health-индикатор фронта + curl-проверки деплоя), без токена.
    location = /api/health {
        proxy_pass http://127.0.0.1:8200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # /api/search — POST, но лёгкий и интерактивный (retrieval, Этап 2a): за токеном + ОБЩИЙ
    # лимит, БЕЗ строгого индексационного (иначе несколько запросов подряд ловят 429). Точный
    # match location = ... перебивает префикс /api/ ниже.
    location = /api/search {
        if ($http_authorization != "Bearer __GATE_TOKEN__") { return 401 '{"detail":"Unauthorized"}'; }
        limit_req zone=jwork_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # /api/chat — POST, интерактивный grounded-чат (Этап 2b): за токеном + ОБЩИЙ лимит (без
    # строгого индексационного, иначе несколько сообщений подряд ловят 429). Таймаут больше
    # search: генерация DeepSeek + возможный retry на пустых цитатах (до 2 вызовов). Точный
    # match location = ... перебивает префикс /api/ ниже.
    location = /api/chat {
        if ($http_authorization != "Bearer __GATE_TOKEN__") { return 401 '{"detail":"Unauthorized"}'; }
        limit_req zone=jwork_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 180s;
    }

    # /api/projects/<id>/edit — POST, интерактивная генерация правки (Этап 3a): за токеном +
    # ОБЩИЙ лимит, БЕЗ строгого индексационного (иначе несколько правок подряд ловят 429). Путь
    # с переменной <id> → regex-location (перебивает префикс /api/ ниже; regex проверяется до
    # префикса). Таймаут как у /api/chat — генерация DeepSeek. proxy_pass без URI-части (regex).
    location ~ ^/api/projects/[^/]+/edit$ {
        if ($http_authorization != "Bearer __GATE_TOKEN__") { return 401 '{"detail":"Unauthorized"}'; }
        limit_req zone=jwork_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 180s;
    }

    # /api/projects/<id>/token и /pr — привязка PAT и реальный PR (Этап 3b): за токеном + ОБЩИЙ
    # лимит. token — быстрый (валидация PAT против GitHub), pr — долгий (генерация DeepSeek + writable-
    # клон + git push + gh pr create), поэтому таймаут больше edit/chat. Regex до префикса /api/ ниже;
    # не пересекается с ^.../edit$ выше. proxy_pass без URI-части (regex).
    location ~ ^/api/projects/[^/]+/(token|pr)$ {
        if ($http_authorization != "Bearer __GATE_TOKEN__") { return 401 '{"detail":"Unauthorized"}'; }
        limit_req zone=jwork_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # /api/projects/<id>/review — POST, AI-ревью PR (Этап 3c): вызывается GitHub Action'ом с
    # Bearer-токеном. Долгая генерация DeepSeek по diff + RAG → таймаут как у /pr. Regex до
    # префикса /api/ ниже; не пересекается с ^.../edit$ и .../(token|pr)$ выше.
    location ~ ^/api/projects/[^/]+/review$ {
        if ($http_authorization != "Bearer __GATE_TOKEN__") { return 401 '{"detail":"Unauthorized"}'; }
        limit_req zone=jwork_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 180s;
    }

    # /api/projects/<id>/agent — POST, файловый tool-агент (Задание 3): прогон (tool-loop DeepSeek
    # по нескольким файлам) и подтверждение PR одним путём. За токеном + ОБЩИЙ лимит, БЕЗ строгого
    # индексационного (несколько итераций/подтверждение подряд не должны ловить 429). Долгая
    # генерация (до 8 итераций function-calling) → таймаут как у /pr. Regex до префикса /api/ ниже;
    # не пересекается с ^.../edit$, .../(token|pr)$, .../review$ выше.
    location ~ ^/api/projects/[^/]+/agent$ {
        if ($http_authorization != "Bearer __GATE_TOKEN__") { return 401 '{"detail":"Unauthorized"}'; }
        limit_req zone=jwork_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # /api/support/ask — POST, ассистент поддержки (Задание 2): за токеном + ОБЩИЙ лимит (без
    # строгого индексационного). Генерация DeepSeek по FAQ + опциональный MCP-запрос тикета →
    # таймаут как у /api/chat. Точный match location = ... перебивает префикс /api/ ниже.
    location = /api/support/ask {
        if ($http_authorization != "Bearer __GATE_TOKEN__") { return 401 '{"detail":"Unauthorized"}'; }
        limit_req zone=jwork_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 180s;
    }

    # /api/* — за токен-барьером (drive-by защита ключа DeepSeek/индексации) + rate-limit.
    # Только заголовок Authorization: Bearer. Токен в query (?token=) НЕ принимаем на /api/ —
    # он бы оседал в access_log/Referer/истории. Фронт бутстрапит ?token= на статике (/),
    # кладёт в localStorage и дальше шлёт заголовком.
    location /api/ {
        if ($http_authorization != "Bearer __GATE_TOKEN__") { return 401 '{"detail":"Unauthorized"}'; }

        limit_req zone=jwork_api burst=20 nodelay;    # общий лимит
        limit_req zone=jwork_index burst=2 nodelay;   # строгий лимит только на POST (map в ratelimit.conf)

        proxy_pass http://127.0.0.1:8200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;   # индексация большого репо может отвечать долго (фон, но POST ждёт запуск)
    }

    # Запрет отдачи dotfiles (.env и т.п.), даже если случайно окажутся в root.
    location ~ /\. {
        deny all;
    }

    # --- TLS (managed by Certbot: sudo certbot --nginx -d jwork.jorchik.com) ---
    # Уже выпущен на Этапе 0; certbot дописал listen 443 ssl + пути к сертификатам и
    # отдельный server{} на listen 80 с редиректом на https (см. живой конфиг).
    listen 443 ssl;
    listen [::]:443 ssl;
    ssl_certificate /etc/letsencrypt/live/jwork.jorchik.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jwork.jorchik.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = jwork.jorchik.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    listen [::]:80;
    server_name jwork.jorchik.com;
    return 404;
}
