# Полный отдельный server{} блок для поддомена jwork.jorchik.com.
# Вставляется как отдельный файл в /etc/nginx/sites-available/jwork.jorchik.com
# (и симлинк в sites-enabled), а НЕ мёржится в существующие server-блоки
# jorchik.com / llm.jorchik.com — свой виртуальный хост со своим фронтом и backend'ом.
#
# DNS: jwork.jorchik.com уже резолвится на этот VPS (wildcard *.jorchik.com,
# 202.71.13.114) — отдельная A-запись не нужна.
#
# Frontend static build выложен в /var/www/jworkplace (см. deploy/README.md).
# Backend — jworkplace.service на 127.0.0.1:8200.

server {
    listen 80;
    listen [::]:80;
    server_name jwork.jorchik.com;

    root /var/www/jworkplace;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Запрет отдачи dotfiles (.env и т.п.), даже если случайно окажутся в root.
    location ~ /\. {
        deny all;
    }

    # --- TLS (managed by Certbot: sudo certbot --nginx -d jwork.jorchik.com) ---
    # После выпуска сертификата certbot сам допишет сюда/перепишет блок примерно так:
    #
    # listen 443 ssl;
    # listen [::]:443 ssl;
    # ssl_certificate /etc/letsencrypt/live/jwork.jorchik.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/jwork.jorchik.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    #
    # и добавит отдельный server{} на listen 80, редиректящий на https.
}
